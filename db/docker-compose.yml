services:
  postgres:
    image: postgres:18
    container_name: fydem-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data:/var/lib/postgresql
      - ./init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - fydem

networks:
  fydem:
    external: true
