services:
  nginx:
    image: nginx:alpine
    container_name: fydem-nginx-frontend
    volumes:
      - ./public:/usr/share/nginx/html/public:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - fydem

networks:
  fydem:
    external: true
