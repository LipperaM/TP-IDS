<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" />
    <title>Admin panel</title>
    <link href="../css/styles.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body>
    <nav class="navbar-container">
        <div class="navbar"></div>
    </nav>

    <div class="panel-equipos mb-3">
        <h2>Panel de equipos</h2>

        <div class="darBaja">
            <h4>Baja de Equipo</h4>
            <div class="input-group" style="max-width: 400px;">
                <select class="form-select" id="equipo" aria-label="Example select with button addon">
                    <option value="">Selecciona tu equipo</option>
                </select>
                <button class="btn btn-outline-danger" type="button"
                    onclick="eliminarEquipo(document.getElementById('equipo').value)">Baja</button>
            </div>
        </div>

        <br>
        <hr>

        <div class="darAlta mb-3">
            <h4>Alta de Equipo</h4>
            <div class="mb-3" style="max-width: 400px;">
                <label for="formGroupExampleInput" class="form-label">Nombre</label>
                <input id="nombre" type="text" class="form-control" id="formGroupExampleInput"
                    placeholder="Ingresa el nombre del equipo">
            </div>
            <div class="mb-3" style="max-width: 400px;">
                <label for="formGroupExampleInput2" class="form-label">Escudo</label>
                <input id="escudo" type="text" class="form-control" id="formGroupExampleInput2"
                    placeholder="Ingresa el escudo del equipo">
            </div>
            <div class="mb-3" style="max-width: 400px;">
                <label for="formGroupExampleInput2" class="form-label">Zona</label>
                <input id="zona" type="text" class="form-control" id="formGroupExampleInput2"
                    placeholder="Ingresa la zona del equipo, A o B">
            </div>
            <button type="button" onclick="altaEquipo()" class="btn btn-outline-primary"
                style="max-width: 400px;">Alta</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="js/config.js"></script>
    <script src="/js/admin.js"></script>
    <script src="/js/navbar.js"></script>
</body>

</html>
