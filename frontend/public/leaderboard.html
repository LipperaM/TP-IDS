<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Tabla de posiciones</title>

    <link rel="icon" href="/favicon.ico" />
    <link href="../css/styles.css" rel="stylesheet" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav class="navbar-container">
      <div class="navbar"></div>
    </nav>

    <div class="title-leaderboard">
      <h1>Posiciones de la Liga Profesional de Fútbol</h1>
      <h5 class="text-center mt-2">Torneo Apertura 2026</h5>
    </div>

    <div class="leaderboard">
      <ul class="nav nav-tabs" id="grupotabla" role="tablist">
        <li class="nav-item" role="presentation">
          <button
            class="nav-link active"
            id="grupoA-tabla"
            data-bs-toggle="tab"
            data-bs-target="#grupoA"
            type="button"
            role="tab"
          >
            Grupo A
          </button>
        </li>

        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            id="grupoB-tabla"
            data-bs-toggle="tab"
            data-bs-target="#grupoB"
            type="button"
            role="tab"
          >
            Grupo B
          </button>
        </li>
      </ul>

      <div class="tab-content mt-3" id="grupotablacontenido">
        <div class="tab-pane fade show active" id="grupoA" role="tabpanel">
          <div class="table-responsive">
            <table class="table table-hover">
              <thead>
                <tr>
                  <th>Posición</th>
                  <th>Equipo</th>
                  <th>Jugados</th>
                  <th>Ganados</th>
                  <th>Empatados</th>
                  <th>Perdidos</th>
                  <th>Puntos</th>
                </tr>
              </thead>
              <tbody id="tablaGrupoA"></tbody>
            </table>
          </div>
        </div>

        <div class="tab-pane fade" id="grupoB" role="tabpanel">
          <div class="table-responsive">
            <table class="table table-hover">
              <thead>
                <tr>
                  <th>Posición</th>
                  <th>Equipo</th>
                  <th>Jugados</th>
                  <th>Ganados</th>
                  <th>Empatados</th>
                  <th>Perdidos</th>
                  <th>Puntos</th>
                </tr>
              </thead>
              <tbody id="tablaGrupoB"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="js/config.js"></script>
    <script src="/js/navbar.js"></script>
    <script src="/js/leaderboard.js"></script>

    <script>
      getEquipos();
    </script>
  </body>
</html>
