<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" />
    <title>Homepage</title>
    <link href="../css/styles.css" rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <!--NAVBAR-->
    <nav class="navbar">
      <div class="navbar-links">
        <a class="navbar-brand" href="./index.html">Home</a>
        <a class="navbar-brand" href="./leaderboard.html">Tabla</a>
        <a class="navbar-brand" href="./profile.html">Mi perfil</a>
      </div>

      <form class="d-flex" role="search">
        <input
          class="form-control"
          type="search"
          placeholder="Buscar en tus post"
          aria-label="Search"
        />
        <button class="btn btn-primary" type="submit">Buscar</button>
      </form>
    </nav>

    <!--CREAR POST-->
    <button class="post-btn" id="openModal">+ Post</button>
    <div class="crear-post">
      <div id="modal" class="modal">
        <div class="modal-content">
          <span id="closeModal" class="closeModal">&times;</span>
          <h2>Nueva publicación</h2>
          <textarea
            id="postText"
            placeholder="Escribí algo..."
            rows="5"
            class="textAreaPost"
          ></textarea>
          <div class="botones-modal">
            <button id="postBtn" class="postBtn" type="button" >Postear</button>
            <div class="dropdown-center">
              <button
                class="btn btn-secondary dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
                id="categoria-btn"
              >
                Categoria
              </button>
              <ul class="dropdown-menu" id="categoria-btn">
                <li>
                  <a class="dropdown-item categoria-opcion" href="#">Libertadores</a>
                </li>
                <li>
                  <a class="dropdown-item categoria-opcion" href="#">Liga profesional de futbol</a>
                </li>
                <li>
                  <a class="dropdown-item categoria-opcion" href="#">Champions</a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>


    <!--POSTS-->
    <div class="post-container" id="post-container">
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="../js/createPost.js"></script>
    <script src="/js/homepage.js"></script>
    <script>crearPostBox()</script>
  </body>
</html>
