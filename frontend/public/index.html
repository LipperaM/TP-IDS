<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" />
    <title>Homepage</title>
    <link href="../css/styles.css" rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <!--NAVBAR-->
    <nav class="navbar">
      <div class="navbar-links">
        <a class="navbar-brand" href="./index.html">Home</a>
        <a class="navbar-brand" href="./leaderboard.html">Tabla</a>
        <a class="navbar-brand" href="./profile.html">Mi perfil</a>
      </div>

      <form class="d-flex" role="search">
        <input
          class="form-control"
          type="search"
          placeholder="Buscar en tus post"
          aria-label="Search"
        />
        <button class="btn btn-primary" type="submit">Buscar</button>
      </form>
    </nav>

    <!--CREAR POST-->
    <button class="post-btn" id="openModal">+ Post</button>
    <div class="crear-post">
      <div id="modal" class="modal">
        <div class="modal-content">
          <span id="closeModal" class="close">&times;</span>
          <h2>Nueva publicación</h2>
          <textarea
            id="postText"
            placeholder="Escribí algo..."
            rows="5"
            class="textAreaPost"
          ></textarea>
          <div class="botones-modal">
            <button id="postBtn">Postear</button>
            <div class="dropdown-center">
              <button
                class="btn btn-secondary dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
                id="categoria-btn"
              >
                Categoria
              </button>
              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item categoria-opcion" href="#"
                    >Libertadores</a
                  >
                </li>
                <li>
                  <a class="dropdown-item categoria-opcion" href="#"
                    >Liga profesional de futbol</a
                  >
                </li>
                <li>
                  <a class="dropdown-item categoria-opcion" href="#"
                    >Champions</a
                  >
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!--POSTS-->
    <div class="post-container">
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script>
      // Modal-Funcionalidad
      const modal = document.getElementById("modal");
      const openModal = document.getElementById("openModal");
      const closeModal = document.getElementById("closeModal");
      const postBtn = document.getElementById("postBtn");
      const postText = document.getElementById("card-text");
      const posts = document.getElementById("card");

      openModal.onclick = () => {
        modal.style.display = "flex";
      };

      closeModal.onclick = () => {
        modal.style.display = "none";
        postText.value = "";
      };

      postBtn.onclick = () => {
        const text = postText.value.trim();
        if (text !== "") {
          const newPost = document.createElement("div");
          newPost.classList.add("post");
          newPost.textContent = text;
          posts.prepend(newPost);
          postText.value = "";
          modal.style.display = "none";
        }
      };
      //Modal-categoria-dropdown
      const categoriaBtn = document.getElementById("categoria-btn");
      const opciones = document.querySelectorAll(".categoria-opcion");

      opciones.forEach((option) => {
        option.addEventListener("click", function (e) {
          e.preventDefault(); // evita que navegue
          categoriaBtn.textContent = this.textContent; // cambia el texto del botón
        });
      });
    </script>

    <script src="/js/homepage.js"></script>
  </body>
</html>
