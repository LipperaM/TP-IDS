<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" />
    <title>Homepage</title>
    <link href="../css/styles.css" rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <!--NAVBAR-->
    <nav class="navbar-container">
      <div class="navbar"></div>
    </nav>

    <!--CREAR POST-->
    <button class="post-btn" id="openModal">+ Post</button>
    <div class="crear-post">
      <div id="modal" class="modal">
        <div class="modal-content">
          <span id="closeModal" class="closeModal">&times;</span>
          <h2>Nueva publicación</h2>
          <textarea
            id="postText"
            placeholder="Escribí algo..."
            rows="5"
            class="textAreaPost"
          ></textarea>
          <div class="botones-modal">
            <button id="postBtn" class="postBtn" type="button">Postear</button>
            <div class="dropdown-center">
              <button
                class="btn btn-secondary dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
                id="categoria-btn"
              >
                Categoria
              </button>
              <ul class="dropdown-menu" id="categoria-btn">
                <li>
                  <a class="dropdown-item categoria-opcion" id="data-categoria-id" href="#">Libertadores</a>
                </li>
                <li>
                  <a class="dropdown-item categoria-opcion" id="data-categoria-id" href="#">Liga profesional de futbol</a>
                </li>
                <li>
                  <a class="dropdown-item categoria-opcion" id="data-categoria-id" href="#">Champions</a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!--pots-->
    <div class="post-container" id="post-container">
    </div>

    <!-- nuevo modal coment-->
    <div class="modal fade" id="commentModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Nuevo comentario</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body">
            <textarea id="modalCommentText" class="form-control" rows="3" placeholder="Escribí tu comentario..."></textarea>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" id="modalSubmitComment">Enviar</button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="js/config.js"></script>
    <script src="../js/createPost.js"></script>
    <script src="/js/navbar.js"></script>
    <script src="/js/homepage.js"></script>
    <script>crearPostBox()</script>
  </body>
</html>
