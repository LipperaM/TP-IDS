  services:
      cloudflared:
        image: cloudflare/cloudflared:latest
        container_name: fydem-cloudflare-tunnel
        command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
        restart: unless-stopped
        networks:
          - fydem
        profiles: ["prod"]

      api:
        build:
          context: ./backend
          dockerfile: Dockerfile
        container_name: fydem-api
        environment:
          NODE_ENV: ${NODE_ENV}
          PORT: ${API_PORT}
          DB_HOST: postgres
          DB_PORT: ${DB_PORT}
          DB_USER: ${POSTGRES_USER}
          DB_PASSWORD: ${POSTGRES_PASSWORD}
          DB_NAME: ${POSTGRES_DB}
        ports:
          - "3000:3000"
        depends_on:
          - postgres
        restart: unless-stopped
        networks:
          - fydem
        profiles: ["dev", "prod"]

      nginx:
        image: nginx:alpine
        container_name: fydem-frontend
        volumes:
          - ./frontend:/usr/share/nginx/html:ro
          - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        ports:
          - "80:80"
        restart: unless-stopped
        networks:
          - fydem

      postgres:
        image: postgres:18
        container_name: fydem-postgres
        environment:
          POSTGRES_USER: ${POSTGRES_USER}
          POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
          POSTGRES_DB: ${POSTGRES_DB}
        volumes:
          - pgdata:/var/lib/postgresql  
          - ./db/init:/docker-entrypoint-initdb.d
        ports:
          - "5432:5432"
        restart: unless-stopped
        networks:
          - fydem

  networks:
    fydem:
      name: fydem

  volumes:
    pgdata:
